name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. PHP syntax check ───────────────────────────────────────────────────
  php-lint:
    name: PHP Syntax (7.4 → 8.3)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["7.4", "8.0", "8.1", "8.2", "8.3"]
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: none

      - name: Lint all PHP files
        run: find . -name "*.php" -not -path "./.git/*" | xargs -P4 php -l | grep -v "No syntax errors" || true
        # xargs -P4 runs 4 lints in parallel; grep filters out success lines

  # ── 2. WordPress Coding Standards ─────────────────────────────────────────
  phpcs:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer, cs2pr

      - name: Install PHPCS + WordPress rules
        run: |
          # Install without triggering the dealerdirect plugin (avoids allow-plugins prompt)
          composer global require --no-plugins --no-interaction \
            "squizlabs/php_codesniffer:^3" \
            "wp-coding-standards/wpcs:^3" \
            "phpcsstandards/phpcsutils:^1" \
            "phpcsstandards/phpcsextra:^1"
          # Register standards paths manually ($HOME, not ~, to ensure correct expansion)
          "$HOME/.composer/vendor/bin/phpcs" --config-set installed_paths \
            "$HOME/.composer/vendor/wp-coding-standards/wpcs,$HOME/.composer/vendor/phpcsstandards/phpcsutils,$HOME/.composer/vendor/phpcsstandards/phpcsextra"

      - name: Run PHPCS
        run: "$HOME/.composer/vendor/bin/phpcs --report=checkstyle | cs2pr"

  # ── 3. WordPress Plugin Check ─────────────────────────────────────────────
  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: wp-cli

      - name: Install WordPress (SQLite — no MySQL needed)
        run: |
          # 1. Download WordPress core
          wp core download --path=/tmp/wordpress --quiet

          # 2. Download SQLite integration plugin directly (wp plugin install
          #    requires wp-config.php which doesn't exist yet at this point)
          mkdir -p /tmp/wordpress/wp-content/plugins
          curl -sL "https://downloads.wordpress.org/plugin/sqlite-database-integration.latest-stable.zip" \
            -o /tmp/sqlite.zip
          unzip -q /tmp/sqlite.zip -d /tmp/wordpress/wp-content/plugins/
          cp /tmp/wordpress/wp-content/plugins/sqlite-database-integration/db.copy \
            /tmp/wordpress/wp-content/db.php

          # 3. Create config (DB values are overridden by SQLite drop-in)
          wp config create \
            --path=/tmp/wordpress \
            --dbname=wordpress \
            --dbuser=root \
            --dbpass='' \
            --skip-check \
            --quiet

          # 4. Point the SQLite drop-in at a writable directory
          wp config set DB_DIR /tmp/wordpress/wp-content/database \
            --path=/tmp/wordpress --quiet
          mkdir -p /tmp/wordpress/wp-content/database

          # 5. Install WordPress
          wp core install \
            --path=/tmp/wordpress \
            --url=http://localhost \
            --title=Test \
            --admin_user=admin \
            --admin_password=password \
            --admin_email=admin@example.com \
            --skip-email \
            --quiet

      - name: Install Plugin Check
        run: wp plugin install plugin-check --activate --path=/tmp/wordpress --quiet

      - name: Copy plugin into WordPress
        run: |
          mkdir -p /tmp/wordpress/wp-content/plugins/uptime-health-endpoint
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.phpcs.xml.dist' \
            --exclude='CLAUDE.md' \
            . /tmp/wordpress/wp-content/plugins/uptime-health-endpoint/

      - name: Run Plugin Check
        run: |
          wp plugin check uptime-health-endpoint \
            --path=/tmp/wordpress \
            --format=table
